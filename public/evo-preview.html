function getArticulo(nombre) {
  const masculinos = ["Facebook", "Instagram", "WhatsApp", "Google", "TikTok", "YouTube",
    "Taladro", "Compresor", "Extractor", "Router", "Banco", "Taller",
    "Stock", "Almacén", "Portfolio", "Marketing", "Diseño"];
  const femeninos = ["Cepilladora", "Fresadora", "Sierra", "Lijadora", "Pistola",
    "Caja", "Cuenta", "Factura", "Lista", "Mesa", "Herramienta"];
  const primeraPalabra = nombre.split(" ")[0];
  if (masculinos.some(m => nombre.includes(m))) return "el";
  if (femeninos.some(f => nombre.includes(f))) return "la";
  // Default: guess by ending
  if (primeraPalabra.endsWith("a") || primeraPalabra.endsWith("ión")) return "la";
  return "el";
}

function personalizarFallback(preguntas, nombre) {
  const art = getArticulo(nombre);
  const Art = art.charAt(0).toUpperCase() + art.slice(1);

    // Replace all generic placeholders with the element name
    return p
      .replace(/El\/la /g, `${Art} `)
      .replace(/el\/la /g, `${art} `)
      .replace(/El\/la$/g, `${Art} ${nombre}`)
      .replace("esta persona o rol", nombre)
      .replace("este elemento", nombre)

function getVariables(subsistema, selectedElements, sistema) {
  // Subsistemas con variables completamente fijas (no dependen de elementos)
  // Para muebleria, ventas NO es fijo — depende del elemento elegido
  if (VARIABLES_FIJAS[subsistema] && !(sistema === "muebleria" && subsistema === "ventas")) return VARIABLES_FIJAS[subsistema];
  const fallback = VARIABLES_FALLBACK[subsistema] || VARIABLES_MIXTAS_GENERICAS;
  const defaultVars = (sistema === "muebleria" && subsistema === "ventas")
    ? VARIABLES_DEFAULT_SUBSISTEMA["ventas_muebleria_default"] || fallback
    : VARIABLES_DEFAULT_SUBSISTEMA[subsistema] || fallback;
  // Sin elementos: mostrar variables generales del subsistema
  if (selectedElements.length === 0) return defaultVars;
  // Un elemento: SOLO variables de ese elemento, sin mezclar con genéricas
  if (selectedElements.length === 1) {
    const mapped = VARIABLES_POR_ELEMENTO[selectedElements[0]];
    if (mapped) return mapped;
    // Elemento personalizado: fallback personalizado solamente
    return personalizarFallback(fallback, selectedElements[0]);
  }
  // Múltiples elementos: combinar las más específicas de cada uno sin genéricas
  const porElemento = selectedElements.flatMap(el => {
    const mapped = VARIABLES_POR_ELEMENTO[el];
    return (mapped || personalizarFallback(fallback, el)).slice(0, 2);
  });
  const unicas = [...new Set(porElemento)].slice(0, 8);
  // Solo agregar genéricas si quedaron muy pocas preguntas
  if (unicas.length < 3) return [...unicas, ...defaultVars.slice(0, 3)];
  return unicas;
}

function getOperaciones(subsistema, selectedElements, sistema) {
  if (OPERACIONES_FIJAS[subsistema] && !(sistema === "muebleria" && subsistema === "ventas")) return OPERACIONES_FIJAS[subsistema];
  const fallback = OPERACIONES_FALLBACK[subsistema] || OPERACIONES_MIXTAS_GENERICAS;
  if (selectedElements.length === 0) return fallback;
  // Un elemento: SOLO operaciones de ese elemento
  if (selectedElements.length === 1) {
    const mapped = OPERACIONES_POR_ELEMENTO[selectedElements[0]];
    if (mapped) return mapped;
    return fallback.map(op => `${op} — ${selectedElements[0]}`);
  }
  const porElemento = selectedElements.flatMap(el => {
    const mapped = OPERACIONES_POR_ELEMENTO[el];
    return (mapped || fallback.map(op => `${op} — ${el}`)).slice(0, 2);
  });
  const unicas = [...new Set(porElemento)].slice(0, 6);
  return [...unicas, ...fallback.slice(0, 2)];
}

      method: "PATCH",
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": `Bearer ${SUPABASE_KEY}`,

        "Prefer": "return=minimal"
      },
      body: JSON.stringify({ usos: newUsos, bloqueado, ultima_actualizacion: new Date().toISOString() })
    });
    return { usos: newUsos, bloqueado };
  } catch { return { usos: 0, bloqueado: false }; }
}

async function hashearClave(clave) {
  const encoder = new TextEncoder();
  const data = encoder.encode(clave);
  const hashBuffer = await crypto.subtle.digest("SHA-256", data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, "0")).join("");
}
